<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation - MedStats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container { width: 100%; max-width: 420px; }
        .logo {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .logo h1 { font-size: 36px; margin-bottom: 5px; }
        .logo p { font-size: 14px; opacity: 0.8; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 22px;
            text-align: center;
        }
        .card p {
            color: #777;
            font-size: 14px;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover { opacity: 0.9; }
        .strength-bar {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.3s;
            background: #ddd;
        }
        .strength-text {
            font-size: 12px;
            margin-top: 5px;
            color: #999;
        }
        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .links a { color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>📊 MedStats</h1>
            <p>Votre santé, analysée intelligemment</p>
        </div>

        <div class="card">
            <h2>🔒 Nouveau mot de passe</h2>
            <p>Choisissez un nouveau mot de passe sécurisé.</p>

            <form method="POST">
                <div class="form-group">
                    <label>Nouveau mot de passe</label>
                    <input type="password" name="password"
                        id="password" placeholder="••••••••"
                        required oninput="checkStrength(this.value)">
                    <div class="strength-bar" id="strength-bar"></div>
                    <p class="strength-text" id="strength-text"></p>
                </div>

                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" name="confirm_password"
                        placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn">
                    Réinitialiser le mot de passe
                </button>
            </form>

            <div class="links">
                <a href="/login">← Retour à la connexion</a>
            </div>
        </div>
    </div>

    <script>
        function checkStrength(password) {
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');
            let strength = 0;

            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            const levels = [
                { color: '#dc3545', label: 'Très faible' },
                { color: '#fd7e14', label: 'Faible' },
                { color: '#ffc107', label: 'Moyen' },
                { color: '#28a745', label: 'Fort' },
            ];

            if (password.length > 0) {
                bar.style.width = (strength * 25) + '%';
                bar.style.background = levels[strength - 1]?.color || '#ddd';
                text.textContent = levels[strength - 1]?.label || '';
            } else {
                bar.style.width = '0%';
                text.textContent = '';
            }
        }
    </script>
</body>
</html>
